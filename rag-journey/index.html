<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工业 RAG 知识库 — 自我演进旅程</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.5rem;font-weight:600;color:#58a6ff;margin-bottom:.25rem}
.subtitle{color:#8b949e;font-size:.9rem;margin-bottom:2rem}
.container{max-width:780px;width:100%}

/* Progress dots */
.progress-bar{display:flex;justify-content:space-between;margin-bottom:2rem;padding:0 .5rem}
.step-dot{display:flex;flex-direction:column;align-items:center;gap:.4rem;flex:1;position:relative}
.step-dot::after{content:'';position:absolute;top:12px;left:50%;width:100%;height:2px;background:#21262d;z-index:0}
.step-dot:last-child::after{display:none}
.step-dot.active::after{background:#58a6ff}
.step-dot.done::after{background:#3fb950}
.dot{width:24px;height:24px;border-radius:50%;background:#21262d;border:2px solid #30363d;display:flex;align-items:center;justify-content:center;font-size:.7rem;z-index:1;transition:all .4s}
.step-dot.active .dot{border-color:#58a6ff;background:#1f3a5f}
.step-dot.done .dot{border-color:#3fb950;background:#1a4a2a}
.dot-label{font-size:.65rem;color:#8b949e;text-align:center;white-space:nowrap}
.step-dot.active .dot-label{color:#58a6ff}
.step-dot.done .dot-label{color:#3fb950}

/* Card */
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.5rem;margin-bottom:1rem;min-height:200px;position:relative}
.card-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #21262d}
.card-header .icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.card-header .name{font-weight:600;font-size:.9rem}
.card-header .tag{font-size:.7rem;padding:.15rem .5rem;border-radius:12px;background:#21262d;color:#8b949e;margin-left:auto}
.card-body{font-size:.88rem;line-height:1.6;color:#c9d1d9}
.card-body .highlight{color:#58a6ff}
.card-body .success{color:#3fb950}
.card-body .warn{color:#d29922}
.card-body .error{color:#f85149}
.card-body code{background:#0d1117;padding:.1rem .3rem;border-radius:4px;font-size:.8rem;color:#ffa657}
.card-body pre{background:#0d1117;padding:.75rem;border-radius:6px;border:1px solid #21262d;overflow-x:auto;font-size:.78rem;line-height:1.5;margin:.5rem 0}
.card-body pre .cm{color:#8b949e}
.card-body pre .cmd{color:#ffa657}
.card-body pre .out{color:#7ee787}

/* Log area */
.log{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:1rem;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:.78rem;line-height:1.6;max-height:200px;overflow-y:auto;margin-bottom:1rem}
.log.hidden{display:none}
.log .line{opacity:0;animation:fadeUp .4s forwards}
.log .info{color:#58a6ff}
.log .scan{color:#79c0ff}
.log .ok{color:#3fb950}
.log .success{color:#3fb950}
.log .warn{color:#d29922}
.log .err{color:#f85149}
.log .audit{color:#d2a8ff}
.log .merge{color:#3fb950;font-weight:600}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Badges */
.badge{display:inline-block;font-size:.65rem;padding:.15rem .45rem;border-radius:10px;margin-right:.25rem}
.badge-green{background:#1a4a2a;color:#3fb950}
.badge-blue{background:#1f3a5f;color:#58a6ff}
.badge-yellow{background:#3a2a1a;color:#d29922}
.ring-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.15rem .6rem;border-radius:12px;font-size:.7rem;font-weight:600;margin-left:.5rem}
.ring-1{background:rgba(88,166,255,.15);color:#58a6ff;border:1px solid rgba(88,166,255,.3)}
.ring-2{background:rgba(210,168,255,.15);color:#d2a8ff;border:1px solid rgba(210,168,255,.3)}
.ring-3{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.badge-red{background:#4a1a1a;color:#f85149}

/* Check rows */
.check-row{display:flex;align-items:center;gap:.5rem;padding:.4rem 0;border-bottom:1px solid #21262d}
.check-row:last-child{border-bottom:none}
.check-row .status{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.status-pass{background:#1a4a2a;color:#3fb950}
.status-fail{background:#4a1a1a;color:#f85149}

/* Controls */
.controls{display:flex;gap:.5rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
.btn{padding:.6rem 1.5rem;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;font-size:.85rem;cursor:pointer;transition:all .2s}
.btn:hover{background:#30363d;border-color:#58a6ff}
.btn-primary{background:#238636;border-color:#2ea043;color:#fff}
.btn-primary:hover{background:#2ea043}
.hidden{display:none}
.fade-in{animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Stats inline */
.stat-row{display:flex;gap:1.5rem;flex-wrap:wrap;margin:.75rem 0}
.stat-item{text-align:center}
.stat-num{font-size:1.4rem;font-weight:800;color:#58a6ff;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:.6rem;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.node-graph{display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap;margin:1rem 0}
.node-item{display:flex;flex-direction:column;align-items:center;padding:.5rem .75rem;border:1px solid #30363d;border-radius:6px;background:#0d1117;font-size:.75rem}
.node-item .num{font-size:.6rem;color:#8b949e}
.arrow{color:#30363d;font-size:1.2rem}
</style>
</head>
<body>

<h1>⚡ 工业 RAG 知识库：自我演进旅程</h1>
<p class="subtitle">从 190 份 FANUC PDF 到 200,835 向量 — Bad Case 驱动自进化 + 环境迁移</p>
<div style="text-align:center;margin-bottom:0.75rem;"><span style="display:inline-block;padding:0.2rem 0.8rem;border:1px solid #30363d;border-radius:12px;font-size:0.7rem;color:#8b949e;background:#0d1117;">📊 实时演进记录 (数据截至 2026-06-27，含迁移)</span></div>

<div class="container">
  <div class="progress-bar" id="progressBar"></div>
  <div id="cardArea" class="card"></div>
  <div id="logArea" class="log hidden"></div>
  <div class="controls" id="controls"></div>
</div>

<script>
const STEPS = [
  { id: 'genesis',    label: 'PDF 入库',     icon: '📄' },
  { id: 'retrieval',  label: '混合检索',     icon: '🔍' },
  { id: 'badcase',    label: '触发 Bad Case', icon: '❌' },
  { id: 'normalize',  label: '查询规范化',   icon: '🔤' },
  { id: 'audit',      label: '每日巡检',     icon: '🛡️' },
  { id: 'docs',       label: '专题文档',     icon: '📝' },
  { id: 'verify',     label: '交叉验证',     icon: '🔬' },
  { id: 'evolved',    label: '演进完成',     icon: '🎉' },
  { id: 'migration',  label: '环境迁移',     icon: '🚚' },
];

let currentStep = -1;
let autoMode = false;
let autoTimer = null;

function renderProgress() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = STEPS.map((s, i) => `
    <div class="step-dot ${i < currentStep ? 'done' : i === currentStep ? 'active' : ''}">
      <div class="dot">${i < currentStep ? '✓' : i === currentStep ? s.icon : ''}</div>
      <div class="dot-label">${s.label}</div>
    </div>
  `).join('');
}

function addLog(msg, type) {
  const area = document.getElementById('logArea');
  area.classList.remove('hidden');
  const div = document.createElement('div');
  if (!type) {
    if (/Audit|审计|巡检|Score/i.test(msg)) type = 'audit';
    else if (/Scan|扫描|检索|Retrieval|RRF/i.test(msg)) type = 'scan';
    else if (/✅|pass|Success|完成|命中|CONFIRMED/i.test(msg)) type = 'ok';
    else if (/❌|fail|Error|CONTRADICTED|未命中/i.test(msg)) type = 'err';
    else if (/⚠|warn|WARN|待确认|NEEDS REVIEW/i.test(msg)) type = 'warn';
    else type = 'info';
  }
  div.className = `line ${type}`;
  div.textContent = msg;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function clearLog() {
  const area = document.getElementById('logArea');
  area.innerHTML = '';
  area.classList.add('hidden');
}

function renderStep(idx) {
  const card = document.getElementById('cardArea');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
  currentStep = idx;
  renderProgress();
  updateControls();

  const s = STEPS[idx];
  switch (s.id) {
    case 'genesis':   renderGenesis(card); break;
    case 'retrieval': renderRetrieval(card); break;
    case 'badcase':   renderBadCase(card); break;
    case 'normalize': renderNormalize(card); break;
    case 'audit':     renderAudit(card); break;
    case 'docs':      renderDocs(card); break;
    case 'verify':    renderVerify(card); break;
    case 'evolved':   renderEvolved(card); break;
    case 'migration': renderMigration(card); break;
  }
}

function renderGenesis(card) {
  addLog('[Pipeline] 导入 190 份 FANUC PDF 手册...');
  setTimeout(() => addLog('[Pipeline] pymupdf4llm 提取文本 → 分块 → BGE-base-zh-v1.5 嵌入 (768维, CPU)'), 300);
  setTimeout(() => addLog('[Pipeline] ChromaDB cosine 存储 → 200,715 chunks'), 600);
  setTimeout(() => addLog('[Pipeline] p2b 质检门禁: 污染检查 + 品牌过滤 (排除 KUKA/ABB/安川)'), 900);
  setTimeout(() => addLog('[Pipeline] 4 通道 LLM: MiMo-Flash → MiMo-Pro → DeepSeek → Qwen2.5:3B'), 1200);
  setTimeout(() => addLog('✅ 知识库就绪。向量数: 200,715 | Good: 54% | Bad: 34%'), 1500);

  card.innerHTML = `
    <div class="card-header">
      <div class="icon" style="background:#1f3a5f">📄</div>
      <div class="name">Phase 1 — 向量库建设</div>
      <span class="tag">2026-03 ~ 04</span>
    </div>
    <div class="card-body">
      <p>将 <span class="highlight">190 份 FANUC PDF</span> 技术手册导入向量知识库。</p>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-num">190</div><div class="stat-lbl">PDF 源文档</div></div>
        <div class="stat-item"><div class="stat-num">200,715</div><div class="stat-lbl">向量 Chunks</div></div>
        <div class="stat-item"><div class="stat-num">768d</div><div class="stat-lbl">嵌入维度</div></div>
        <div class="stat-item"><div class="stat-num">4</div><div class="stat-lbl">LLM 通道</div></div>
      </div>
      <pre><span class="cm"># 导入管线</span>
<span class="cmd">rag_builder.py</span>    → PDF 提取 + 分块 + 嵌入
<span class="cmd">rag_builder_ocr.py</span> → PaddleOCR 增强扫描件
<span class="cmd">p2b_ingest_gate.py</span> → 入库前质检门禁
<span class="cmd">rag_import_fanuc.py</span> → FANUC 专用导入</pre>
      <p style="margin-top:.5rem">当前检索质量: Good 54% · <span class="error">Bad 34%</span> · 平均 top_score 0.74</p>
    </div>
  `;
}

function renderRetrieval(card) {
  addLog('[检索] 用户提问: "SRVO-023 电机过热怎么处理？"');
  setTimeout(() => addLog('[检索] _normalize_query: SRVO-023 已规范化 (无需修正)'), 300);
  setTimeout(() => addLog('[检索] expand_query: +servo/驱动/放大器 +alarm/故障代码'), 600);
  setTimeout(() => addLog('[检索] 向量检索 top-20 + BM25 top-20 并行执行...'), 900);
  setTimeout(() => addLog('[检索] RRF 融合 (k=60): 向量 rank#1 + BM25 rank#1 → 0.950'), 1200);
  setTimeout(() => addLog('[检索] 实体精确搜索: SRVO-023 命中 entity_alarm_index → +0.30 加分'), 1500);
  setTimeout(() => addLog('✅ [1] 0.950 | B-83195CM_10.PDF — SRVO-023 负载超过额定值'), 1800);
  setTimeout(() => addLog('   [2] 0.880 | B-83284CM-1_08.PDF — 报警代码手册'), 1950);

  card.innerHTML = `
    <div class="card-header">
      <div class="icon" style="background:#1a4a2a">🔍</div>
      <div class="name">BM25 + 向量混合检索</div>
      <span class="tag">2026-05</span>
    </div>
    <div class="card-body">
      <p><span class="highlight">RRF (Reciprocal Rank Fusion)</span> 双通道融合排序。</p>
      <pre><span class="cm"># 检索管线</span>
<span class="cmd">_normalize_query()</span>  → 型号/报警码规范化
<span class="cmd">expand_query()</span>     → 同义词扩展 (30+ 组)
<span class="cmd">Vector top-20</span>      → bge-base-zh-v1.5 语义
<span class="cmd">BM25 top-20</span>        → jieba 分词 + BM25Okapi
<span class="cmd">RRF fusion</span>         → rank → 1/(60+rank) 归一化
<span class="cmd">entity_alarm_search</span>→ 报警代码精确匹配 +0.30</pre>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-num">20</div><div class="stat-lbl">BM25 候选</div></div>
        <div class="stat-item"><div class="stat-num">20</div><div class="stat-lbl">向量候选</div></div>
        <div class="stat-item"><div class="stat-num">60</div><div class="stat-lbl">RRF k 常数</div></div>
      </div>
    </div>
  `;
}

function renderBadCase(card) {
  addLog('[查询] "法那科机器人SRVO023电机过热"');
  setTimeout(() => addLog('[查询] ⚠️ 未规范化: "法那科" 不在别名表 → 检索失败'), 300);
  setTimeout(() => addLog('[查询] top_score = 0.420 < 阈值 0.6'), 600);
  setTimeout(() => addLog('❌ Bad Case 触发! 用户收到低质量回答'), 900);
  setTimeout(() => addLog('[日志] 写入 badcase_pending.jsonl...'), 1200);
  setTimeout(() => addLog('[分析] Bad Case 根因分布:'), 1500);
  setTimeout(() => addLog('   A类 知识库无内容: 38%  (可补文档)'), 1700);
  setTimeout(() => addLog('   B类 对比型问题:   21%  (可补专题)'), 1900);
  setTimeout(() => addLog('   C类 无效查询:     31%  (可过滤)'), 2100);
  setTimeout(() => addLog('   D类 口语化查询:   10%  (可规范化)'), 2300);

  card.innerHTML = `
    <div class="card-header">
      <div class="icon" style="background:#4a1a1a">❌</div>
      <div class="name">Bad Case — 口语化查询导致检索失败</div>
      <span class="tag">触发修复</span>
    </div>
    <div class="card-body">
      <p>工程师用口语提问 <span class="error">"法那科"</span> 而非标准名 <span class="highlight">"FANUC"</span>，向量检索语义鸿沟导致 top_score 低于阈值。</p>
      <div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1rem;margin:.75rem 0">
        <div style="font-weight:600;color:#f85149;margin-bottom:.5rem">Bad Case 根因分析</div>
        <div class="check-row"><div class="status status-fail">A</div><div>知识库无对应内容 — 38% (CR机器人/安全功能/选型文档缺失)</div></div>
        <div class="check-row"><div class="status status-fail">B</div><div>对比/综合型问题 — 21% (文档结构缺陷，无专题对比)</div></div>
        <div class="check-row"><div class="status status-fail">C</div><div>无效/重复查询 — 31% (题库噪音，非真实场景)</div></div>
        <div class="check-row"><div class="status status-fail">D</div><div>口语化查询 — 10% (法那科/Fanuc/M900 等非标写法)</div></div>
      </div>
      <p>驱动修复: <span class="highlight">查询规范化</span> + <span class="highlight">专题文档补全</span> + <span class="highlight">每日巡检</span></p>
    </div>
  `;
}

function renderNormalize(card) {
  addLog('[修复] _normalize_query 新增中文别名映射...');
  setTimeout(() => addLog('   法那科 → FANUC | 发那科 → FANUC | 法兰克 → FANUC'), 300);
  setTimeout(() => addLog('   CR35iA → CR-35iA | CR7iA → CR-7iA'), 600);
  setTimeout(() => addLog('   FANUCM-900 → FANUC M-900 (补空格)'), 900);
  setTimeout(() => addLog('[修复] synonyms.json 新增 10 组同义词...'), 1200);
  setTimeout(() => addLog('   协作机器人/cobot/CR系列 | DCS/双检安全/safety speed'), 1400);
  setTimeout(() => addLog('   工具坐标系/UTOOL/tool frame | 干伸长度/stick-out'), 1600);
  setTimeout(() => addLog('   起弧/arc start | 收弧/arc end'), 1800);
  setTimeout(() => addLog('[验证] "法那科机器人SRVO023" → "FANUC机器人SRVO-023"'), 2100);
  setTimeout(() => addLog('✅ 检索命中: 0.950 | B-83195CM_10.PDF'), 2400);

  card.innerHTML = `
    <div class="card-header">
      <div class="icon" style="background:#3a2a1a">🔤</div>
      <div class="name">查询规范化 + 同义词扩展</div>
      <span class="tag">2026-06-15</span>
    </div>
    <div class="card-body">
      <p>从 Bad Case 驱动的 <span class="highlight">NLP 规范化增强</span>。</p>
      <pre><span class="cm"># _normalize_query 新增</span>
<span class="cmd">_CHINESE_ALIASES</span>  → 法那科/发那科/法兰克 → FANUC
<span class="cmd">CR 系列正则</span>      → CR35iA → CR-35iA
<span class="cmd">FANUC 空格补全</span>   → FANUCM-900 → FANUC M-900

<span class="cm"># synonyms.json 新增</span>
协作机器人(cobot) | DCS(双检安全) | 工具坐标系(UTOOL)
干伸长度(stick-out) | 起弧(arc start) | 收弧(arc end)</pre>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-num">5</div><div class="stat-lbl">中文别名</div></div>
        <div class="stat-item"><div class="stat-num">10</div><div class="stat-lbl">新同义词组</div></div>
        <div class="stat-item"><div class="stat-num">6</div><div class="stat-lbl">补全占位符</div></div>
      </div>
    </div>
  `;
}

function renderAudit(card) {
  addLog('[巡检] daily_audit.py — 每日 6:00 自动执行');
  setTimeout(() => addLog('[巡检] 抽取 8 题 (L1: 2 + L2: 3 + L3: 3), 30 天不重复'), 300);
  setTimeout(() => addLog('[巡检] ✅ L3-022 [选型] score=0.731 — 弧焊机器人选型参数'), 600);
  setTimeout(() => addLog('[巡检] ✅ L3-007 [故障排查] score=0.795 — 弧焊起弧失败排查'), 800);
  setTimeout(() => addLog('[巡检] ✅ V2-005 [报警代码] score=0.950 — ARC146-149 焊接脉冲'), 1000);
  setTimeout(() => addLog('[巡检] ❌ V2-014 [坐标系] score=0.669 — UFrame/UTool 未命中关键词'), 1200);
  setTimeout(() => addLog('[巡检] → badcase_pending.jsonl 写入 1 条待审'), 1500);
  setTimeout(() => addLog('[巡检] 通过率: 7/8 (88%) | 报告: audit_2026-06-16.json'), 1800);
  setTimeout(() => addLog('✅ 飞书推送: HTTP 200'), 2000);

  card.innerHTML = `
    <div class="card-header">
      <div class="icon" style="background:#1f3a5f">🛡️</div>
      <div class="name">每日巡检 — 263 题自动化审计</div>
      <span class="tag">cron 6:00</span>
    </div>
    <div class="card-body">
      <p>每日自动抽样审计，Bad Case 自动积累待审。</p>
      <div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1rem;margin:.75rem 0">

function updateControls() {
  const c = document.getElementById('controls');
  const isLast = currentStep === STEPS.length - 1;
  const isFirst = currentStep === 0;
  c.innerHTML = `
    <button class="btn" onclick="goStep(-1)" ${isFirst ? 'disabled style="opacity:.4"' : ''}>← 上一步</button>
    ${!autoMode ?
      `<button class="btn" onclick="toggleAuto()">▶ 自动播放</button>` :
      `<button class="btn btn-primary" onclick="toggleAuto()">⏸ 暂停</button>`
    }
    <button class="btn btn-primary" onclick="goStep(1)" ${isLast ? 'disabled style="opacity:.5"' : ''}>下一步 →</button>
    ${isLast ? '<button class="btn" onclick="resetJourney()">🔄 重新开始</button>' : ''}
  `;
}

function goStep(dir) {
  if (autoMode && dir > 0) stopAuto();
  const next = currentStep + dir;
  if (next < 0 || next >= STEPS.length) return;
  clearLog();
  renderStep(next);
}

function toggleAuto() {
  if (autoMode) stopAuto();
  else startAuto();
}

function startAuto() {
  autoMode = true;
  updateControls();
  if (currentStep >= STEPS.length - 1) { resetJourney(); return; }
  clearLog();
  renderStep(currentStep + 1);
  autoTimer = setTimeout(() => {
    if (currentStep < STEPS.length - 1 && autoMode) startAuto();
    else stopAuto();
  }, 3500);
}

function stopAuto() {
  autoMode = false;
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  updateControls();
}

function resetJourney() {
  stopAuto();
  clearLog();
  renderStep(0);
}

// Init
renderStep(0);
