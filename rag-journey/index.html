   434|function updateControls() {

   436|  const isLast = currentStep === STEPS.length - 1;
   437|  const isFirst = currentStep === 0;
   438|  c.innerHTML = `
   439|    <button class="btn" onclick="goStep(-1)" ${isFirst ? 'disabled style="opacity:.4"' : ''}>← 上一步</button>
   440|    ${!autoMode ?
   441|      `<button class="btn" onclick="toggleAuto()">▶ 自动播放</button>` :
   442|      `<button class="btn btn-primary" onclick="toggleAuto()">⏸ 暂停</button>`
   443|    }
   444|    <button class="btn btn-primary" onclick="goStep(1)" ${isLast ? 'disabled style="opacity:.5"' : ''}>下一步 →</button>
   445|    ${isLast ? '<button class="btn" onclick="resetJourney()">🔄 重新开始</button>' : ''}
   446|  `;

   449|function goStep(dir) {
   450|  if (autoMode && dir > 0) stopAuto();
   451|  const next = currentStep + dir;
   452|  if (next < 0 || next >= STEPS.length) return;
   453|  clearLog();
   454|  renderStep(next);

   457|function toggleAuto() {
   458|  if (autoMode) stopAuto();
   459|  else startAuto();
   460|}
   461|
   462|function startAuto() {
   463|  autoMode = true;
   464|  updateControls();
   465|  if (currentStep >= STEPS.length - 1) { resetJourney(); return; }
   466|  clearLog();
   467|  renderStep(currentStep + 1);
   468|  autoTimer = setTimeout(() => {
   469|    if (currentStep < STEPS.length - 1 && autoMode) startAuto();
   470|    else stopAuto();
   471|  }, 3500);
   472|}
   473|
   474|function stopAuto() {
   475|  autoMode = false;
   476|  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
   477|  updateControls();
   478|}
   479|
   480|function resetJourney() {
   481|  stopAuto();

   483|  renderStep(0);
